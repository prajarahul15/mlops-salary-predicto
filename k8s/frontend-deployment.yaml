# ── Frontend Deployment ───────────────────────────────────
# Deploys the Nginx static UI for the Salary Predictor
# Apply: kubectl apply -f k8s/frontend-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: salary-ui
  labels:
    app: salary-ui
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: salary-ui
  template:
    metadata:
      labels:
        app: salary-ui
        tier: frontend
    spec:
      containers:
        - name: salary-ui
          image:  prajarahul15/salary-ui:latest   # replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      restartPolicy: Always

---
# ── Frontend Service ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: salary-ui-service
  labels:
    app: salary-ui
spec:
  selector:
    app: salary-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP       # exposed externally via Ingress below
